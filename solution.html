    let currentUserId = null;
    let currentStatus = null;
    let targetSlug = null;
    let currentDifficulty = null;

    async function initialize() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            window.location.href = './';
            return;
        }
        currentUserId = session.user.id;
        
        // Fetch User Avatar
        const avatar = document.getElementById('user-avatar');
        if (avatar && session.user.user_metadata.avatar_url) {
            avatar.src = session.user.user_metadata.avatar_url;
        }
        
        const params = new URLSearchParams(window.location.search);
        targetSlug = params.get('slug');
        if (!targetSlug) window.location.href = './dashboard';

        renderProblemData();
        await fetchSolvedSetForSidebar();
        renderSidebar();
        fetchCloudState();
    }

    let solvedSlugSet = new Set();

    async function fetchSolvedSetForSidebar() {
        const { data, error } = await supabaseClient
            .from('user_progress')
            .select('problem_slug')
            .eq('user_id', currentUserId)
            .eq('status', 'solved');

        solvedSlugSet = (!error && data) ? new Set(data.map(d => d.problem_slug)) : new Set();
    }

    function renderSidebar() {
        const prob = PROBLEM_REGISTRY.find(p => p.slug === targetSlug);
        if (!prob) return;

        const sameCategory = PROBLEM_REGISTRY.filter(p => p.category === prob.category);
        const solvedCount = sameCategory.filter(p => solvedSlugSet.has(p.slug)).length;

        document.getElementById('sidebar-category-title').textContent = prob.category;
        document.getElementById('sidebar-progress').textContent = `${solvedCount}/${sameCategory.length}`;

        const list = document.getElementById('sidebar-list');
        list.innerHTML = sameCategory.map(p => {
            const isSolved = solvedSlugSet.has(p.slug);
            const isActive = p.slug === targetSlug;

            const icon = isSolved
                ? `<svg class="w-4 h-4 text-emerald-500 flex-shrink-0" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`
                : `<div class="w-3.5 h-3.5 rounded-full border-2 border-slate-300 dark:border-slate-700 flex-shrink-0"></div>`;

            return `
                <li>
                    <a href="./solution?slug=${p.slug}" class="flex items-center gap-3 px-4 py-3 text-sm transition-colors ${isActive ? 'bg-blue-50 dark:bg-blue-950/30 border-l-2 border-blue-500' : 'hover:bg-slate-50 dark:hover:bg-slate-800/50 border-l-2 border-transparent'}">
                        ${icon}
                        <span class="truncate ${isActive ? 'font-semibold text-blue-700 dark:text-blue-400' : 'text-slate-700 dark:text-slate-300'}">${p.title}</span>
                    </a>
                </li>
            `;
        }).join('');
    }

    function renderProblemData() {
        const probIndex = PROBLEM_REGISTRY.findIndex(p => p.slug === targetSlug);
        if (probIndex === -1) return;
        
        const prob = PROBLEM_REGISTRY[probIndex];
        currentDifficulty = prob.difficulty;
        
        document.title = `algoHub | ${prob.title}`;
        document.getElementById('breadcrumb').innerHTML = `<a href="./category?course=blind-75&type=${encodeURIComponent(prob.category)}" class="hover:text-blue-500 transition">${prob.category}</a> <span class="text-slate-400 dark:text-slate-600">&gt;</span> <span># ${prob.title}</span>`;
        document.getElementById('prob-title').textContent = prob.title;
        document.getElementById('leetcode-link').href = `https://leetcode.com/problems/${prob.slug}/`;
        
        const d = new Date();
        const dateOptions = { month: 'short', day: 'numeric', year: 'numeric' };
        document.getElementById('date-label').textContent = d.toLocaleDateString('en-US', dateOptions);

        const diffEl = document.getElementById('prob-diff');
        diffEl.textContent = prob.difficulty;
        if(prob.difficulty === 'Easy') diffEl.className = "px-2.5 py-0.5 rounded text-xs font-bold bg-emerald-100 dark:bg-emerald-900/40 text-emerald-700 dark:text-emerald-400";
        if(prob.difficulty === 'Medium') diffEl.className = "px-2.5 py-0.5 rounded text-xs font-bold bg-amber-100 dark:bg-amber-900/40 text-amber-700 dark:text-amber-400";
        if(prob.difficulty === 'Hard') diffEl.className = "px-2.5 py-0.5 rounded text-xs font-bold bg-red-100 dark:bg-red-900/40 text-red-700 dark:text-red-400";

        if (probIndex > 0) {
            const prev = PROBLEM_REGISTRY[probIndex - 1];
            const prevLink = document.getElementById('link-prev');
            prevLink.classList.remove('invisible');
            prevLink.href = `./solution?slug=${prev.slug}`;
            document.getElementById('text-prev').textContent = `# ${prev.title}`;
        }
        if (probIndex < PROBLEM_REGISTRY.length - 1) {
            const next = PROBLEM_REGISTRY[probIndex + 1];
            const nextLink = document.getElementById('link-next');
            nextLink.classList.remove('invisible');
            nextLink.href = `./solution?slug=${next.slug}`;
            document.getElementById('text-next').textContent = `# ${next.title}`;
        }
    }

    async function fetchCloudState() {
        const { data, error } = await supabaseClient
            .from('user_progress')
            .select('status')
            .eq('user_id', currentUserId)
            .eq('problem_slug', targetSlug)
            .single();

        currentStatus = data ? data.status : null;
        updateStatusUI();
    }

    async function setCloudState(newStatus) {
        const previousStatus = currentStatus;
        currentStatus = currentStatus === newStatus ? null : newStatus; 
        updateStatusUI(); 
        
        if (currentStatus) {
            await supabaseClient.from('user_progress').upsert({
                user_id: currentUserId,
                problem_slug: targetSlug,
                status: currentStatus,
                updated_at: new Date().toISOString()
            }, { onConflict: 'user_id, problem_slug' });

            if (newStatus === 'solved' && previousStatus !== 'solved') {
                solvedSlugSet.add(targetSlug);
                awardXPAndStreak(currentDifficulty);
            }
        } else {
            solvedSlugSet.delete(targetSlug);
            await supabaseClient.from('user_progress')
                .delete()
                .eq('user_id', currentUserId)
                .eq('problem_slug', targetSlug);
        }
        renderSidebar();
    }

    async function awardXPAndStreak(difficulty) {
        const XP_MAP = { Easy: 10, Medium: 20, Hard: 30 };
        const xpGain = XP_MAP[difficulty] || 10;

        const today = new Date();
        const todayStr = today.toISOString().split('T')[0];

        const { data: stats } = await supabaseClient
            .from('user_stats')
            .select('*')
            .eq('user_id', currentUserId)
            .single();

        let xp = xpGain;
        let newStreak = 1;
        let longestStreak = 1;
        let streakExtended = true;

        if (stats) {
            xp = (stats.xp || 0) + xpGain;
            longestStreak = stats.longest_streak || 1;

            if (stats.last_active_date === todayStr) {
                // Already solved something today; streak doesn't change again
                newStreak = stats.current_streak || 1;
                streakExtended = false;
            } else {
                const yesterday = new Date(today);
                yesterday.setDate(yesterday.getDate() - 1);
                const yStr = yesterday.toISOString().split('T')[0];

                newStreak = (stats.last_active_date === yStr) ? (stats.current_streak || 0) + 1 : 1;
            }
            longestStreak = Math.max(longestStreak, newStreak);
        }

        await supabaseClient.from('user_stats').upsert({
            user_id: currentUserId,
            xp: xp,
            current_streak: newStreak,
            longest_streak: longestStreak,
            last_active_date: todayStr,
            updated_at: new Date().toISOString()
        }, { onConflict: 'user_id' });

        showRewardToast(xpGain, newStreak, streakExtended);
    }

    function showRewardToast(xpGain, streak, streakExtended) {
        const toast = document.createElement('div');
        toast.className = "fixed bottom-6 right-6 z-[100] bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-700 shadow-2xl rounded-2xl px-5 py-4 flex items-center gap-3 translate-y-4 opacity-0 transition-all duration-300";
        toast.innerHTML = `
            <div class="w-10 h-10 rounded-xl bg-emerald-100 dark:bg-emerald-900/40 flex items-center justify-center flex-shrink-0">
                <svg class="w-5 h-5 text-emerald-600 dark:text-emerald-400" fill="currentColor" viewBox="0 0 24 24"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>
            </div>
            <div>
                <p class="text-sm font-bold text-slate-900 dark:text-white">+${xpGain} XP earned</p>
                <p class="text-xs text-slate-500 dark:text-slate-400 flex items-center gap-1">
                    <span>🔥</span>
                    ${streakExtended ? `${streak} day streak${streak > 1 ? ' — keep it going!' : ' started!'}` : `Streak: ${streak} day${streak > 1 ? 's' : ''}`}
                </p>
            </div>
        `;
        document.body.appendChild(toast);
        requestAnimationFrame(() => {
            toast.classList.remove('translate-y-4', 'opacity-0');
        });
        setTimeout(() => {
            toast.classList.add('translate-y-4', 'opacity-0');
            setTimeout(() => toast.remove(), 300);
        }, 3200);
    }

    function updateStatusUI() {
        const btnSolved = document.getElementById('btn-toggle-solved');
        const textSolved = document.getElementById('text-solved-status');
        const iconUnsolved = document.getElementById('icon-unsolved');
        const iconSolved = document.getElementById('icon-solved');
        
        const btnReview = document.getElementById('btn-toggle-review');
        const textReview = document.getElementById('text-review-status');

        btnSolved.className = "flex items-center gap-2 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 px-4 py-2 rounded-full text-sm font-medium transition shadow-sm cursor-pointer";
        btnReview.className = "flex items-center gap-2 bg-white dark:bg-slate-900 hover:bg-slate-50 dark:hover:bg-slate-800 border border-slate-300 dark:border-slate-700 text-slate-700 dark:text-slate-300 px-4 py-2 rounded-full text-sm font-medium transition shadow-sm cursor-pointer";
        
        iconUnsolved.classList.remove('hidden');
        iconSolved.classList.add('hidden');
        textSolved.textContent = 'Mark as Complete';
        textReview.textContent = 'Needs Review';

        if (currentStatus === 'solved') {
            btnSolved.className = "flex items-center gap-2 bg-emerald-50 dark:bg-emerald-950/30 border border-emerald-200 dark:border-emerald-900/50 text-emerald-700 dark:text-emerald-400 px-4 py-2 rounded-full text-sm font-medium transition cursor-pointer";
            iconUnsolved.classList.add('hidden');
            iconSolved.classList.remove('hidden');
            textSolved.textContent = 'Completed';
        } else if (currentStatus === 'review') {
            btnReview.className = "flex items-center gap-2 bg-amber-50 dark:bg-amber-950/30 border border-amber-200 dark:border-amber-900/50 text-amber-700 dark:text-amber-400 px-4 py-2 rounded-full text-sm font-medium transition cursor-pointer";
            textReview.textContent = 'Reviewing';
        }
    }

    document.getElementById('btn-copy-page').onclick = async (e) => {
        try {
            await navigator.clipboard.writeText(window.location.href);
            const btn = e.currentTarget.querySelector('span');
            const originalText = btn.textContent;
            btn.textContent = 'Copied!';
            e.currentTarget.classList.add('text-emerald-600', 'border-emerald-600', 'dark:text-emerald-400', 'dark:border-emerald-400');
            setTimeout(() => { 
                btn.textContent = originalText; 
                e.currentTarget.classList.remove('text-emerald-600', 'border-emerald-600', 'dark:text-emerald-400', 'dark:border-emerald-400');
            }, 2000);
        } catch (err) {
            console.error('Failed to copy', err);
        }
    };

    document.getElementById('btn-toggle-solved').onclick = () => setCloudState('solved');
    document.getElementById('btn-toggle-review').onclick = () => setCloudState('review');
    document.getElementById('btn-logout').onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = './'; };

    initialize();
  </script>
</body>
</html>
