<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>algoHub | The Execution Engine</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .glass-panel {
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border: 1px solid rgba(0, 0, 0, 0.1);
    }
    html.dark .glass-panel {
      background: rgba(15, 23, 42, 0.6);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    @keyframes blob {
      0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
      33% { transform: translate(60px, -80px) scale(1.2) rotate(15deg); }
      66% { transform: translate(-50px, 50px) scale(0.8) rotate(-15deg); }
      100% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
    }
    .animate-blob {
      animation: blob 8s infinite alternate ease-in-out;
    }
    .animation-delay-2000 {
      animation-delay: 2s;
    }
    .animation-delay-4000 {
      animation-delay: 4s;
    }
    .animation-delay-6000 {
      animation-delay: 6s;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-900 dark:bg-slate-950 dark:text-slate-100 min-h-screen font-sans selection:bg-blue-500/30 overflow-x-hidden flex flex-col relative transition-colors duration-300">

  <div class="fixed inset-0 z-0 overflow-hidden pointer-events-none">
    <div class="absolute top-0 left-1/4 w-[500px] h-[500px] bg-blue-400/40 dark:bg-blue-600/30 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[120px] animate-blob transition-colors duration-300"></div>
    <div class="absolute top-1/4 right-1/4 w-[400px] h-[400px] bg-indigo-400/40 dark:bg-indigo-600/30 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[100px] animate-blob animation-delay-2000 transition-colors duration-300"></div>
    <div class="absolute -bottom-32 left-1/3 w-[600px] h-[600px] bg-purple-400/40 dark:bg-purple-600/30 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[120px] animate-blob animation-delay-4000 transition-colors duration-300"></div>
    <div class="absolute top-1/2 left-1/2 w-[450px] h-[450px] bg-emerald-400/20 dark:bg-emerald-600/20 rounded-full mix-blend-multiply dark:mix-blend-screen filter blur-[120px] animate-blob animation-delay-6000 transition-colors duration-300"></div>
    <canvas id="particle-canvas" class="absolute inset-0 opacity-80 dark:opacity-60"></canvas>
  </div>

  <header class="relative z-50 w-full max-w-7xl mx-auto px-6 py-6 flex justify-between items-center">
    <div class="flex items-center gap-3 hover:opacity-80 transition cursor-pointer">
      <img src="./icon.png" alt="algoHub" class="w-10 h-10 shadow-md rounded-xl">
      <span class="text-2xl font-black tracking-tighter text-slate-900 dark:text-white transition-colors duration-300">algoHub</span>
    </div>
    <div class="flex items-center gap-4">
      <button id="theme-toggle" class="p-2.5 rounded-xl bg-white/80 dark:bg-slate-900/80 border border-slate-200 dark:border-slate-800 hover:bg-slate-100 dark:hover:bg-slate-800 transition shadow-sm flex items-center justify-center cursor-pointer">
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 text-amber-500" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 text-indigo-600" fill="currentColor" viewBox="0 0 24 24"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
      </button>
      <button id="btn-login-nav" class="glass-panel text-slate-900 dark:text-white px-5 py-2.5 rounded-xl font-bold text-sm transition cursor-pointer flex items-center gap-2 shadow-lg group">
        Sign In
        <svg class="w-4 h-4 text-blue-600 dark:text-blue-400 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
      </button>
    </div>
  </header>

  <main class="relative z-10 w-full max-w-4xl mx-auto px-6 pt-20 pb-24 flex flex-col items-center text-center flex-grow">
    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full glass-panel text-xs font-bold tracking-widest text-blue-600 dark:text-blue-400 mb-8 shadow-sm">
      <span class="w-2 h-2 rounded-full bg-blue-600 dark:bg-blue-500 animate-pulse"></span>
      Algorithmic Sandbox
    </div>
    
    <h1 class="text-5xl sm:text-7xl font-black tracking-tighter text-slate-900 dark:text-white leading-[1.1] mb-6 transition-colors duration-300">
      Master the <span class="text-transparent bg-clip-text bg-gradient-to-r from-blue-600 to-indigo-500 dark:from-blue-400 dark:to-indigo-300">Logic.</span><br>
      Visualize the Code.
    </h1>
    
    <p class="text-slate-600 dark:text-slate-400 text-lg sm:text-xl max-w-2xl leading-relaxed mb-10 transition-colors duration-300">
      A purely interactive execution environment for data structures. Step through matrix evaluations, graph traversals, and dynamic pointer shifts in real-time.
    </p>

    <button id="btn-login-hero" class="bg-blue-600 hover:bg-blue-500 text-white font-bold px-10 py-4 rounded-2xl transition shadow-[0_0_30px_rgba(37,99,235,0.3)] text-base flex items-center gap-3 cursor-pointer transform hover:-translate-y-1">
      Launch Engine
      <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
    </button>
  </main>

  <footer class="relative z-10 w-full border-t border-slate-200 dark:border-slate-800/60 bg-white/40 dark:bg-slate-950/40 glass-panel border-x-0 border-b-0 transition-colors duration-300">
    <div class="max-w-7xl mx-auto px-6 py-6 flex flex-col sm:flex-row items-center justify-between gap-4">
      <span class="text-xs font-mono text-slate-500 font-semibold">© 2026 algoHub Engine. Developed by Songram Biswas.</span>
      <div class="flex items-center gap-5">
        <a href="https://www.linkedin.com/in/songram-biswas-b156a8380" target="_blank" class="text-slate-500 hover:text-blue-600 dark:hover:text-blue-400 transition">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M19 0h-14c-2.761 0-5 2.239-5 5v14c0 2.761 2.239 5 5 5h14c2.762 0 5-2.239 5-5v-14c0-2.761-2.238-5-5-5zm-11 19h-3v-11h3v11zm-1.5-12.268c-.966 0-1.75-.79-1.75-1.764s.784-1.764 1.75-1.764 1.75.79 1.75 1.764-.783 1.764-1.75 1.764zm13.5 12.268h-3v-5.604c0-3.368-4-3.113-4 0v5.604h-3v-11h3v1.765c1.396-2.586 7-2.777 7 2.476v6.759z"/></svg>
        </a>
        <a href="https://twitter.com/songram_biswas" target="_blank" class="text-slate-500 hover:text-slate-900 dark:hover:text-white transition">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.005 4.15H5.059z"/></svg>
        </a>
        <a href="https://www.facebook.com/songram.biswas.967" target="_blank" class="text-slate-500 hover:text-blue-600 transition">
          <svg class="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M9 8h-3v4h3v12h5v-12h3.642l.358-4h-4v-1.667c0-.955.192-1.333 1.115-1.333h2.885v-5h-3.808c-3.596 0-5.192 1.583-5.192 4.615v3.385z"/></svg>
        </a>
      </div>
    </div>
  </footer>

  <script type="module">
    import { SUPABASE_CONFIG } from './config.js';
    const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);
    
    const themeToggleBtn = document.getElementById('theme-toggle');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');

    function updateParticlesColor() {
        const isDark = document.documentElement.classList.contains('dark');
        return isDark ? 'rgba(99, 102, 241, 0.6)' : 'rgba(59, 130, 246, 0.5)';
    }

    let particleColor = updateParticlesColor();

    if (localStorage.getItem('color-theme') === 'light' || (!('color-theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.remove('dark');
        lightIcon.classList.remove('hidden');
        particleColor = 'rgba(59, 130, 246, 0.5)';
    } else {
        document.documentElement.classList.add('dark');
        darkIcon.classList.remove('hidden');
        particleColor = 'rgba(99, 102, 241, 0.6)';
    }

    themeToggleBtn.addEventListener('click', function() {
        darkIcon.classList.toggle('hidden');
        lightIcon.classList.toggle('hidden');
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark');
            localStorage.setItem('color-theme', 'light');
            particleColor = 'rgba(59, 130, 246, 0.5)';
        } else {
            document.documentElement.classList.add('dark');
            localStorage.setItem('color-theme', 'dark');
            particleColor = 'rgba(99, 102, 241, 0.6)';
        }
    });

    async function init() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (session) {
            window.location.href = './dashboard';
        }
    }

    function triggerGoogleLogin() {
        supabaseClient.auth.signInWithOAuth({
            provider: 'google',
            options: { redirectTo: 'https://songram-biswas.github.io/algohub/dashboard' }
        });
    }

    document.getElementById('btn-login-nav').onclick = triggerGoogleLogin;
    document.getElementById('btn-login-hero').onclick = triggerGoogleLogin;
    
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');
    let width, height, particles;

    function initParticles() {
        width = canvas.width = window.innerWidth;
        height = canvas.height = window.innerHeight;
        particles = [];
        for (let i = 0; i < 120; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                vx: (Math.random() - 0.5) * 2.5,
                vy: (Math.random() - 0.5) * 2.5,
                radius: Math.random() * 2.5 + 0.5
            });
        }
    }

    function animateParticles() {
        requestAnimationFrame(animateParticles);
        ctx.clearRect(0, 0, width, height);
        
        particles.forEach(p => {
            p.x += p.vx;
            p.y += p.vy;
            if (p.x < 0 || p.x > width) p.vx *= -1;
            if (p.y < 0 || p.y > height) p.vy *= -1;
            
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = particleColor;
            ctx.fill();
        });

        ctx.lineWidth = 0.8;
        for (let i = 0; i < particles.length; i++) {
            for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);
                
                if (dist < 150) {
                    ctx.beginPath();
                    const opacity = 0.3 - dist/500;
                    ctx.strokeStyle = particleColor.replace(/[\d.]+\)$/g, opacity + ')');
                    ctx.moveTo(particles[i].x, particles[i].y);
                    ctx.lineTo(particles[j].x, particles[j].y);
                    ctx.stroke();
                }
            }
        }
    }

    window.addEventListener('resize', initParticles);
    initParticles();
    animateParticles();
    init();
  </script>
</body>
</html>
