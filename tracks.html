<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>algoHub | Pattern Tracks</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    .glass { backdrop-filter: blur(12px) saturate(180%); -webkit-backdrop-filter: blur(12px) saturate(180%); }
    body { background-attachment: fixed; }
    html.dark body { background-color: #020617; background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.08) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(79, 70, 229, 0.08) 0px, transparent 50%); }
    html:not(.dark) body { background-color: #f8fafc; background-image: radial-gradient(at 0% 0%, rgba(56, 189, 248, 0.15) 0px, transparent 50%), radial-gradient(at 100% 100%, rgba(99, 102, 241, 0.1) 0px, transparent 50%); }
  </style>
</head>
<body class="text-slate-900 dark:text-slate-100 min-h-screen transition-colors duration-200">

  <header class="sticky top-0 z-50 bg-white/60 dark:bg-slate-950/60 border-b border-slate-200/50 dark:border-slate-800/50 glass px-6 py-4 flex justify-between items-center">
    <a href="./dashboard" class="flex items-center gap-3 hover:opacity-80 transition">
      <img src="./favicon.png" alt="algoHub" class="w-9 h-9 shadow-md rounded-xl">
      <span class="text-xl font-black tracking-tight font-sans text-slate-900 dark:text-white">algoHub</span>
    </a>
    <div class="flex items-center gap-4">
      <button id="theme-toggle" class="p-2 rounded-xl bg-white/50 dark:bg-slate-900/50 border border-slate-200/50 dark:border-slate-800/50 hover:bg-slate-100 dark:hover:bg-slate-800 transition min-w-[40px] min-h-[40px] flex items-center justify-center cursor-pointer">
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5 text-amber-400" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5 text-indigo-500" fill="currentColor" viewBox="0 0 24 24"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
      </button>
      <div class="flex items-center gap-3 border-l border-slate-300/50 dark:border-slate-700/50 pl-4">
        <img id="user-avatar" class="w-9 h-9 rounded-full border border-slate-300 dark:border-slate-700 bg-slate-200 dark:bg-slate-800 object-cover shadow-sm" src="" alt="Profile">
        <button id="btn-logout" class="text-xs bg-red-50 hover:bg-red-100 text-red-600 dark:bg-red-950/30 dark:hover:bg-red-900/50 dark:text-red-400 border border-red-200 dark:border-red-900/50 px-4 py-2 rounded-xl font-bold transition cursor-pointer shadow-sm">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-6 py-12">
    <div class="mb-8">
      <a href="./dashboard" class="text-sm text-blue-500 hover:underline flex items-center gap-1">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        Back to Courses
      </a>
      <h1 id="course-title" class="text-3xl font-extrabold tracking-tight mt-3 text-slate-900 dark:text-white">Pattern Tracks</h1>
    </div>
    <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="tracks-grid"></div>
  </main>

  <script type="module">
    import { SUPABASE_CONFIG } from './config.js';
    const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);

    const themeToggleBtn = document.getElementById('theme-toggle');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');

    if (localStorage.getItem('color-theme') === 'light' || (!('color-theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.remove('dark'); lightIcon.classList.remove('hidden');
    } else {
        document.documentElement.classList.add('dark'); darkIcon.classList.remove('hidden');
    }

    themeToggleBtn.addEventListener('click', function() {
        darkIcon.classList.toggle('hidden'); lightIcon.classList.toggle('hidden');
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark'); localStorage.setItem('color-theme', 'light');
        } else {
            document.documentElement.classList.add('dark'); localStorage.setItem('color-theme', 'dark');
        }
    });

    const COURSES = { "blind-75": ["Array", "String", "Linked List", "Binary", "Matrix", "Interval", "Tree", "Heap", "Graph", "Dynamic Programming"] };

    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.href = './'; return; }
        const avatar = document.getElementById('user-avatar');
        if (avatar && session.user.user_metadata.avatar_url) avatar.src = session.user.user_metadata.avatar_url;
        renderTracks();
    }

    function renderTracks() {
        const urlParams = new URLSearchParams(window.location.search);
        const courseKey = urlParams.get('course') || 'blind-75';
        const tracks = COURSES[courseKey] || [];
        
        document.getElementById('course-title').textContent = `${courseKey.toUpperCase().replace('-', ' ')} Tracks`;
        const grid = document.getElementById('tracks-grid');
        grid.innerHTML = tracks.map(track => {
            return `
                <div class="bg-white/80 dark:bg-slate-900/80 glass border border-slate-200 dark:border-slate-800/60 rounded-2xl p-5 flex flex-col justify-between hover:shadow-lg transition">
                  <div>
                    <h3 class="text-lg font-bold text-slate-900 dark:text-white">${track}</h3>
                    <p class="text-slate-500 dark:text-slate-400 text-xs mt-1">Practice patterns for ${track} structures.</p>
                  </div>
                  <a href="./category?course=${courseKey}&type=${encodeURIComponent(track)}" class="mt-5 bg-slate-900 dark:bg-slate-800 hover:bg-slate-800 dark:hover:bg-slate-700 text-xs text-center py-2.5 rounded-xl font-semibold block text-white transition cursor-pointer">Open Category</a>
                </div>
            `;
        }).join('');
    }

    document.getElementById('btn-logout').onclick = async () => {
        await supabaseClient.auth.signOut();
        window.location.href = './';
    };

    checkAuth();
  </script>
</body>
</html>
