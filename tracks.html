<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>algoHub | Pattern Tracks</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' }</script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>

  .theme-orb { width: 20px; height: 20px; border-radius: 50%; position: relative; transition: all .3s; flex-shrink: 0; }
  .theme-orb.sun { background: radial-gradient(circle at 35% 30%, #ffe9b0, #f5a623 70%); box-shadow: 0 0 12px 2px rgba(245,166,35,0.55); }
  .theme-orb.moon { background: radial-gradient(circle at 65% 35%, #d8def8, #94a3ff 75%); box-shadow: 0 0 10px 1px rgba(148,163,255,0.5); }
  .theme-orb.moon::before { content:''; position:absolute; top:3px; left:2px; width:7px; height:7px; border-radius:50%; background:#0a0a14; opacity:.35; }
  .theme-orb.moon::after { content:''; position:absolute; top:10px; left:10px; width:4px; height:4px; border-radius:50%; background:#0a0a14; opacity:.3; }

    body { background-color: #fafafa; }
    html.dark body { background-color: #0a0a0a; }
  </style>
</head>
<body class="text-slate-900 dark:text-slate-200 min-h-screen font-sans antialiased selection:bg-blue-500/30">

  <header class="sticky top-0 z-50 bg-white dark:bg-[#0a0a0a] border-b border-slate-200 dark:border-[#262626] px-6 py-3 flex justify-between items-center w-full">
    <a href="./dashboard" class="flex items-center gap-3 hover:opacity-80 transition cursor-pointer">
      <img src="./icon.png" alt="algoHub" class="w-8 h-8 rounded-lg shadow-sm">
      <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">algoHub</span>
    </a>

    <div class="flex items-center gap-4">
      <button id="theme-toggle" class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-[#1a1a1a] transition cursor-pointer"><span id="theme-orb" class="theme-orb sun"></span></button>

      <div class="flex items-center gap-3 pl-4 border-l border-slate-200 dark:border-[#262626]">
        <img id="user-avatar" class="w-8 h-8 rounded-full border border-slate-200 dark:border-[#262626] bg-slate-100 dark:bg-[#111111] object-cover" src="" alt="Profile">
        <button id="btn-logout" class="text-xs font-semibold text-slate-600 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-400 transition cursor-pointer">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-12">
    <div class="mb-10">
      <a href="./dashboard" class="text-sm font-medium text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition flex items-center gap-1.5 mb-2 w-max">
        <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
        Dashboard
      </a>
      <h1 id="course-title" class="text-4xl font-black tracking-tight text-slate-900 dark:text-white">Curriculum Tracks</h1>
      <p class="text-slate-500 dark:text-slate-400 text-sm mt-2">Select a conceptual pattern to begin your targeted practice session.</p>
    </div>
    
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6" id="tracks-grid"></div>
  </main>

  <script type="module">
    import { SUPABASE_CONFIG } from './config.js';
    const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);

        const themeToggleBtn = document.getElementById('theme-toggle');
    const orb = document.getElementById('theme-orb');
    function applyTheme(isDark) {
        document.documentElement.classList.toggle('dark', isDark);
        orb.classList.toggle('sun', !isDark);
        orb.classList.toggle('moon', isDark);
    }
    const storedTheme = localStorage.getItem('color-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    applyTheme(storedTheme === 'dark' || (!storedTheme && prefersDark));

    themeToggleBtn.addEventListener('click', function() {
        const goingDark = !document.documentElement.classList.contains('dark');
        applyTheme(goingDark);
        localStorage.setItem('color-theme', goingDark ? 'dark' : 'light');
        });

    const TRACK_METADATA = {
        "Array": {
            color: "blue",
            desc: "Contiguous memory and two-pointer basics.",
            svg: `<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line>`
        },
        "String": {
            color: "indigo",
            desc: "Sliding windows and character hashing.",
            svg: `<polyline points="4 7 4 4 20 4 20 7"></polyline><line x1="9" y1="20" x2="15" y2="20"></line><line x1="12" y1="4" x2="12" y2="20"></line>`
        },
        "Linked List": {
            color: "purple",
            desc: "Pointer manipulation and cycle detection.",
            svg: `<circle cx="6" cy="12" r="3"></circle><circle cx="18" cy="12" r="3"></circle><line x1="9" y1="12" x2="15" y2="12"></line><polyline points="13 9 16 12 13 15"></polyline>`
        },
        "Binary": {
            color: "rose",
            desc: "Bitwise operations and binary logic.",
            svg: `<rect x="2" y="2" width="20" height="8" rx="2" ry="2"></rect><rect x="2" y="14" width="20" height="8" rx="2" ry="2"></rect><line x1="6" y1="6" x2="6.01" y2="6"></line><line x1="6" y1="18" x2="6.01" y2="18"></line>`
        },
        "Matrix": {
            color: "cyan",
            desc: "2D traversals and spatial transformations.",
            svg: `<rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="3" y1="15" x2="21" y2="15"></line><line x1="9" y1="3" x2="9" y2="21"></line><line x1="15" y1="3" x2="15" y2="21"></line>`
        },
        "Interval": {
            color: "amber",
            desc: "Sorting boundaries and merging sequences.",
            svg: `<line x1="4" y1="6" x2="14" y2="6"></line><line x1="10" y1="12" x2="20" y2="12"></line><line x1="6" y1="18" x2="16" y2="18"></line><circle cx="4" cy="6" r="1"></circle><circle cx="14" cy="6" r="1"></circle><circle cx="10" cy="12" r="1"></circle><circle cx="20" cy="12" r="1"></circle><circle cx="6" cy="18" r="1"></circle><circle cx="16" cy="18" r="1"></circle>`
        },
        "Tree": {
            color: "emerald",
            desc: "DFS, BFS, and hierarchical traversals.",
            svg: `<circle cx="12" cy="5" r="3"></circle><circle cx="6" cy="16" r="3"></circle><circle cx="18" cy="16" r="3"></circle><line x1="10.5" y1="7.5" x2="7.5" y2="13.5"></line><line x1="13.5" y1="7.5" x2="16.5" y2="13.5"></line>`
        },
        "Heap": {
            color: "orange",
            desc: "Priority queues and Top-K patterns.",
            svg: `<path d="M12 3l-4 7h8z"></path><path d="M8 12l-4 7h8z"></path><path d="M16 12l-4 7h8z"></path>`
        },
        "Graph": {
            color: "violet",
            desc: "Node networks and shortest paths.",
            svg: `<circle cx="5" cy="5" r="3"></circle><circle cx="19" cy="5" r="3"></circle><circle cx="12" cy="19" r="3"></circle><line x1="7.5" y1="5" x2="16.5" y2="5"></line><line x1="6.5" y1="7.5" x2="10.5" y2="16.5"></line><line x1="17.5" y1="7.5" x2="13.5" y2="16.5"></line>`
        },
        "Dynamic Programming": {
            color: "fuchsia",
            desc: "Memoization and subproblem optimization.",
            svg: `<rect x="3" y="3" width="8" height="8" rx="1"></rect><rect x="13" y="3" width="8" height="8" rx="1"></rect><rect x="8" y="13" width="8" height="8" rx="1"></rect><polyline points="7 11 7 17 8 17"></polyline><polyline points="17 11 17 17 16 17"></polyline>`
        }
    };

    const COURSES = { "blind-75": ["Array", "String", "Linked List", "Binary", "Matrix", "Interval", "Tree", "Heap", "Graph", "Dynamic Programming"] };

    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.href = './'; return; }
        const avatar = document.getElementById('user-avatar');
        if (avatar && session.user.user_metadata.avatar_url) avatar.src = session.user.user_metadata.avatar_url;
        renderTracks();
    }

    function renderTracks() {
        const urlParams = new URLSearchParams(window.location.search);
        const courseKey = urlParams.get('course') || 'blind-75';
        const tracks = COURSES[courseKey] || [];
        
        document.getElementById('course-title').textContent = `${courseKey.toUpperCase().replace('-', ' ')} Curriculum`;
        
        const grid = document.getElementById('tracks-grid');
        grid.innerHTML = tracks.map(track => {
            const meta = TRACK_METADATA[track] || { color: "slate", desc: "Algorithmic practice set.", svg: `<circle cx="12" cy="12" r="10"></circle>` };
            
            return `
                <a href="./category?course=${courseKey}&type=${encodeURIComponent(track)}" class="group block bg-white dark:bg-[#111111] border border-slate-200 dark:border-[#262626] rounded-2xl p-6 hover:shadow-xl hover:-translate-y-1 transition-all duration-300 relative overflow-hidden">
                    <div class="absolute inset-0 opacity-0 group-hover:opacity-5 dark:group-hover:opacity-10 bg-${meta.color}-500 transition-opacity duration-300"></div>
                    
                    <div class="flex items-center gap-4 mb-4">
                        <div class="w-12 h-12 rounded-xl bg-${meta.color}-50 dark:bg-[#1a1a1a] border border-${meta.color}-100 dark:border-[#333333] flex items-center justify-center text-${meta.color}-500 group-hover:scale-110 transition-transform duration-300">
                            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                ${meta.svg}
                            </svg>
                        </div>
                        <h3 class="text-xl font-bold text-slate-900 dark:text-white group-hover:text-${meta.color}-600 dark:group-hover:text-${meta.color}-400 transition-colors">${track}</h3>
                    </div>
                    
                    <p class="text-slate-500 dark:text-slate-400 text-sm leading-relaxed mb-6 h-10">
                        ${meta.desc}
                    </p>
                    
                    <div class="flex items-center justify-between mt-auto border-t border-slate-100 dark:border-[#262626] pt-4">
                        <span class="text-xs font-bold uppercase tracking-widest text-slate-400 dark:text-slate-500 group-hover:text-${meta.color}-500 transition-colors">Enter Track</span>
                        <svg class="w-4 h-4 text-slate-300 dark:text-slate-600 group-hover:text-${meta.color}-500 group-hover:translate-x-1 transition-all" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M5 12h14M12 5l7 7-7 7"></path></svg>
                    </div>
                </a>
            `;
        }).join('');
    }

    document.getElementById('btn-logout').onclick = async () => {
        await supabaseClient.auth.signOut();
        window.location.href = './';
    };

    checkAuth();
  </script>
</body>
</html>
