<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>algoHub | Dashboard</title>
  <link rel="icon" type="image/png" href="./favicon.png">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    body { background-color: #fafafa; }
    html.dark body { background-color: #0a0a0a; }
    .util-panel {
        background-color: #ffffff;
        border: 1px solid #e5e7eb;
        box-shadow: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
    }
    html.dark .util-panel {
        background-color: #111111;
        border: 1px solid #262626;
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.2);
    }
    .custom-scrollbar::-webkit-scrollbar { height: 6px; }
    .custom-scrollbar::-webkit-scrollbar-track { background: rgba(0,0,0,0.05); border-radius: 10px; }
    .custom-scrollbar::-webkit-scrollbar-thumb { background: rgba(148, 163, 184, 0.4); border-radius: 10px; }
  </style>
</head>
<body class="text-slate-900 dark:text-slate-200 min-h-screen font-sans antialiased selection:bg-blue-500/30">

  <header class="sticky top-0 z-50 bg-white dark:bg-[#0a0a0a] border-b border-slate-200 dark:border-[#262626] px-6 py-3 flex justify-between items-center w-full">
    <a href="./dashboard" class="flex items-center gap-3 hover:opacity-80 transition cursor-pointer">
      <img src="./favicon.png" alt="algoHub" class="w-8 h-8 rounded-lg shadow-sm">
      <span class="text-xl font-bold tracking-tight text-slate-900 dark:text-white">algoHub</span>
    </a>

    <div class="flex items-center gap-4">
      <button id="theme-toggle" class="p-2 rounded-lg text-slate-500 hover:bg-slate-100 dark:text-slate-400 dark:hover:bg-[#1a1a1a] transition cursor-pointer">
        <svg id="theme-toggle-dark-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m12.728 0l-.707-.707M6.343 6.343l-.707-.707M12 7a5 5 0 100 10 5 5 0 000-10z"></path></svg>
        <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
      </button>

      <div class="flex items-center gap-3 pl-4 border-l border-slate-200 dark:border-[#262626]">
        <img id="user-avatar" class="w-8 h-8 rounded-full border border-slate-200 dark:border-[#262626] bg-slate-100 dark:bg-[#111111] object-cover" src="" alt="Profile">
        <button id="btn-logout" class="text-xs font-semibold text-slate-600 hover:text-red-600 dark:text-slate-400 dark:hover:text-red-400 transition cursor-pointer">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-6 py-10">
    <div class="mb-10">
      <h2 class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white">Dashboard</h2>
      <p class="text-slate-500 dark:text-slate-400 text-sm mt-1">Track your execution consistency and manage your curriculums.</p>
    </div>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
      
      <div class="lg:col-span-2 flex flex-col gap-6">
        
        <div class="util-panel rounded-xl p-6">
          <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white">Active Curriculum</h3>
          </div>
          
          <div class="border border-slate-200 dark:border-[#262626] rounded-lg p-5 bg-slate-50 dark:bg-[#0f0f0f] flex flex-col sm:flex-row sm:items-center justify-between gap-4">
            <div>
              <div class="flex items-center gap-2 mb-1">
                <span class="px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-widest bg-blue-100 text-blue-700 dark:bg-blue-900/40 dark:text-blue-400">Core</span>
                <h4 class="text-base font-bold text-slate-900 dark:text-white">Blind 75 Matrix</h4>
              </div>
              <p class="text-xs text-slate-500 dark:text-slate-400">High-yield technical interview patterns.</p>
            </div>
            
            <div class="flex items-center gap-4 w-full sm:w-auto">
              <div class="flex-grow sm:flex-grow-0 sm:w-32">
                <div class="flex justify-between text-xs font-mono text-slate-500 dark:text-slate-400 mb-1">
                  <span>Progress</span>
                  <span id="progress-text">0%</span>
                </div>
                <div class="w-full bg-slate-200 dark:bg-[#262626] h-1.5 rounded-full overflow-hidden">
                  <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
              </div>
              <a href="./tracks?course=blind-75" class="bg-slate-900 hover:bg-slate-800 dark:bg-white dark:hover:bg-slate-200 text-white dark:text-slate-900 text-sm font-medium px-4 py-2 rounded-lg transition shadow-sm whitespace-nowrap">Resume</a>
            </div>
          </div>
        </div>

        <div class="util-panel rounded-xl p-6">
          <div class="flex justify-between items-center mb-6">
            <h3 class="text-lg font-bold text-slate-900 dark:text-white">Execution Heatmap</h3>
            <span class="text-sm font-mono text-slate-500 dark:text-slate-400" id="total-solves-lbl">0 Solves</span>
          </div>
          
          <div class="flex gap-3 w-full overflow-x-auto pb-2 custom-scrollbar">
            <div class="flex flex-col gap-[7px] text-[10px] text-slate-400 dark:text-slate-500 font-mono pt-5">
              <span class="h-3.5 flex items-center"></span>
              <span class="h-3.5 flex items-center">Mon</span>
              <span class="h-3.5 flex items-center"></span>
              <span class="h-3.5 flex items-center">Wed</span>
              <span class="h-3.5 flex items-center"></span>
              <span class="h-3.5 flex items-center">Fri</span>
              <span class="h-3.5 flex items-center"></span>
            </div>
            
            <div class="flex flex-col gap-1 w-full min-w-max">
              <div class="flex text-[10px] text-slate-400 dark:text-slate-500 font-mono justify-between mb-1 pr-4" id="month-labels"></div>
              <div class="grid grid-rows-7 gap-[3px] grid-flow-col" id="contribution-grid"></div>
            </div>
          </div>
        </div>

      </div>

      <div class="util-panel rounded-xl flex flex-col h-full max-h-[500px]">
        <div class="p-5 border-b border-slate-200 dark:border-[#262626]">
          <div class="flex items-center gap-2">
            <svg class="w-4 h-4 text-amber-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
            <h3 class="text-base font-bold text-slate-900 dark:text-white">Needs Review</h3>
          </div>
        </div>
        
        <ul id="review-list" class="divide-y divide-slate-100 dark:divide-[#262626] overflow-y-auto custom-scrollbar flex-grow">
          <li class="p-5 text-sm text-slate-500 dark:text-slate-400 text-center">No problems marked for review.</li>
        </ul>
      </div>

    </div>
  </main>

  <script type="module">
    import { SUPABASE_CONFIG } from './config.js';
    const supabaseClient = supabase.createClient(SUPABASE_CONFIG.url, SUPABASE_CONFIG.key);

    const themeToggleBtn = document.getElementById('theme-toggle');
    const darkIcon = document.getElementById('theme-toggle-dark-icon');
    const lightIcon = document.getElementById('theme-toggle-light-icon');

    if (localStorage.getItem('color-theme') === 'light' || (!('color-theme' in localStorage) && !window.matchMedia('(prefers-color-scheme: dark)').matches)) {
        document.documentElement.classList.remove('dark'); lightIcon.classList.remove('hidden');
    } else {
        document.documentElement.classList.add('dark'); darkIcon.classList.remove('hidden');
    }

    themeToggleBtn.addEventListener('click', function() {
        darkIcon.classList.toggle('hidden'); lightIcon.classList.toggle('hidden');
        if (document.documentElement.classList.contains('dark')) {
            document.documentElement.classList.remove('dark'); localStorage.setItem('color-theme', 'light');
        } else {
            document.documentElement.classList.add('dark'); localStorage.setItem('color-theme', 'dark');
        }
    });

    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) { window.location.href = './'; return; }
        
        const avatar = document.getElementById('user-avatar');
        if (avatar && session.user.user_metadata.avatar_url) avatar.src = session.user.user_metadata.avatar_url;
        
        fetchCloudData(session.user.id);
    }

    async function fetchCloudData(userId) {
        const { data, error } = await supabaseClient
            .from('user_progress')
            .select('problem_slug, status, updated_at')
            .eq('user_id', userId);

        if (error) return console.error("Database fetch error:", error.message);

        const solved = data.filter(d => d.status === 'solved');
        const review = data.filter(d => d.status === 'review');

        updateProgression(solved.length);
        renderContributionGrid(solved);
        renderReviewList(review);
    }

    function updateProgression(solvedCount) {
        const blind75TotalCount = 75; 
        const percent = Math.min(Math.round((solvedCount / blind75TotalCount) * 100), 100);
        document.getElementById('progress-text').textContent = `${percent}%`;
        document.getElementById('progress-bar').style.width = `${percent}%`;
        document.getElementById('total-solves-lbl').textContent = `${solvedCount} Solves`;
    }

    function renderContributionGrid(solvedData) {
        const grid = document.getElementById('contribution-grid');
        const monthLabels = document.getElementById('month-labels');
        grid.innerHTML = '';
        
        const counts = {};
        solvedData.forEach(record => {
            const dateStr = record.updated_at.split('T')[0];
            counts[dateStr] = (counts[dateStr] || 0) + 1;
        });

        const today = new Date();
        const currentDayOfWeek = today.getDay();
        const totalWeeks = 18;
        const startDaysAgo = (totalWeeks * 7) + currentDayOfWeek;

        const monthNames = [];
        for (let i = totalWeeks; i >= 0; i -= 4) {
             const d = new Date();
             d.setDate(d.getDate() - (i * 7));
             monthNames.push(d.toLocaleString('default', { month: 'short' }));
        }
        monthLabels.innerHTML = monthNames.map(m => `<span>${m}</span>`).join('');

        for (let i = startDaysAgo; i >= 0; i--) {
            const d = new Date();
            d.setDate(d.getDate() - i);
            const dateStr = d.toISOString().split('T')[0];
            const count = counts[dateStr] || 0;

            let bgClass = 'bg-slate-200 dark:bg-[#262626]'; 
            if (count === 1) bgClass = 'bg-emerald-300 dark:bg-emerald-800';
            else if (count >= 2) bgClass = 'bg-emerald-500 dark:bg-emerald-500';

            grid.innerHTML += `<div class="w-3.5 h-3.5 rounded-sm ${bgClass} transition-colors cursor-help" title="${count} solves on ${dateStr}"></div>`;
        }
    }

    function renderReviewList(reviewData) {
        const list = document.getElementById('review-list');
        if (reviewData.length === 0) return;

        list.innerHTML = reviewData.map(item => `
            <li>
                <a href="./solutions/${item.problem_slug}.html" class="flex justify-between items-center p-4 hover:bg-slate-50 dark:hover:bg-[#1a1a1a] transition-colors group cursor-pointer">
                    <span class="text-sm font-semibold text-slate-900 dark:text-slate-200 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition capitalize">${item.problem_slug.replace(/-/g, ' ')}</span>
                    <svg class="w-4 h-4 text-slate-400 group-hover:text-blue-600 dark:group-hover:text-blue-400 transition" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
                </a>
            </li>
        `).join('');
    }

    document.getElementById('btn-logout').onclick = async () => {
        await supabaseClient.auth.signOut();
        window.location.href = './';
    };
    
    checkAuth();
  </script>
</body>
</html>
