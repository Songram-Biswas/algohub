        .glass-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 0, 0, 0.1);
        }
        html.dark .glass-panel {
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        @keyframes blob {
            0% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
            33% { transform: translate(60px, -80px) scale(1.2) rotate(15deg); }
            66% { transform: translate(-50px, 50px) scale(0.8) rotate(-15deg); }
            100% { transform: translate(0px, 0px) scale(1) rotate(0deg); }
        }
        .animate-blob { animation: blob 8s infinite alternate ease-in-out; }
        .animation-delay-2000 { animation-delay: 2s; }
        .animation-delay-4000 { animation-delay: 4s; }
        .animation-delay-6000 { animation-delay: 6s; }
    </style>
</head>

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = './';
                return;
            }
            const avatar = document.getElementById('user-avatar');
            if (avatar && session.user.user_metadata.avatar_url) {
                avatar.src = session.user.user_metadata.avatar_url;
            }
            renderCategory();
        }

        function renderCategory() {
            const params = new URLSearchParams(window.location.search);
            const course = params.get('course') || 'blind-75';
            const cat = params.get('type') || 'Array';
            const query = document.getElementById('search-box').value.toLowerCase();

            document.getElementById('back-link').href = `./tracks?course=${course}`;
            document.getElementById('category-title').textContent = `${cat}`;

            const container = document.getElementById('problem-list');
            container.innerHTML = '';

            const solvedArray = JSON.parse(localStorage.getItem('algolab_solved_keys') || '[]');

            PROBLEM_REGISTRY.forEach(prob => {
                if (prob.category === cat) {
                    if (query && !prob.title.toLowerCase().includes(query) && !prob.id.toString().includes(query)) {
                        return;
                    }

                    const isSolved = solvedArray.includes(prob.slug);
                    const card = document.createElement('div');
                    card.className = "glass-panel rounded-2xl p-5 flex flex-col sm:flex-row sm:items-center justify-between shadow-lg hover:shadow-[0_0_20px_rgba(59,130,246,0.15)] transition-all duration-300 transform hover:-translate-y-1 group relative overflow-hidden";

                    let targetUrl = `./solution?slug=${prob.slug}`;
                    if (prob.implemented) {
                        targetUrl = `./solutions/${prob.slug}`;
                    }

                    const btn = `<a href="${targetUrl}" class="bg-blue-600/10 dark:bg-blue-500/20 hover:bg-blue-600 dark:hover:bg-blue-500 border border-blue-500/50 text-blue-600 dark:text-blue-400 hover:text-white text-xs font-bold px-6 py-2.5 rounded-xl transition-all flex items-center gap-2">View Problem <svg class="w-3 h-3 group-hover:translate-x-1 transition-transform" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 5l7 7-7 7"></path></svg></a>`;
                    
                    let diffColor = 'text-emerald-600 border-emerald-500/30 bg-emerald-500/10 dark:text-emerald-400';
                    if (prob.difficulty === 'Medium') diffColor = 'text-amber-600 border-amber-500/30 bg-amber-500/10 dark:text-amber-400';
                    if (prob.difficulty === 'Hard') diffColor = 'text-red-600 border-red-500/30 bg-red-500/10 dark:text-red-400';

                    card.innerHTML = `
                        <div class="absolute inset-0 bg-gradient-to-r from-blue-600/0 to-purple-600/0 group-hover:from-blue-600/5 group-hover:to-purple-600/5 transition-colors duration-500 pointer-events-none"></div>
                        <div class="relative flex items-center gap-5 mb-4 sm:mb-0">
                            <div class="w-12 h-12 rounded-xl bg-slate-100 dark:bg-slate-800/50 border border-slate-300 dark:border-slate-700 flex items-center justify-center font-mono text-slate-500 dark:text-slate-400 font-bold shadow-inner">
                                ${prob.id}
                            </div>
                            <div>
                                <h3 class="text-lg font-bold text-slate-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${prob.title}</h3>
                                <div class="flex items-center gap-3 mt-1.5">
                                    <span class="text-[10px] px-2.5 py-0.5 rounded-full font-black uppercase tracking-widest border ${diffColor}">${prob.difficulty}</span>
                                </div>
                            </div>
                        </div>
                        <div class="relative w-full sm:w-auto flex justify-end">
                            ${btn}
                        </div>
                    `;
                    container.appendChild(card);
                }
            });

        // Background Particles Logic
        const canvas = document.getElementById('particle-canvas');
        const ctx = canvas.getContext('2d');
        let width, height, particles;

        function initParticles() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles = [];
            for (let i = 0; i < 60; i++) {
                particles.push({
                    x: Math.random() * width, y: Math.random() * height,
                    vx: (Math.random() - 0.5) * 1.5, vy: (Math.random() - 0.5) * 1.5,
                    radius: Math.random() * 2 + 0.5
                });
            }
        }

        function animateParticles() {
            requestAnimationFrame(animateParticles);
            ctx.clearRect(0, 0, width, height);
            particles.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if (p.x < 0 || p.x > width) p.vx *= -1;
                if (p.y < 0 || p.y > height) p.vy *= -1;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
                ctx.fillStyle = particleColor;
                ctx.fill();
            });
            ctx.lineWidth = 0.5;
            for (let i = 0; i < particles.length; i++) {
                for (let j = i + 1; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        const opacity = 0.2 - dist/750;
                        ctx.strokeStyle = particleColor.replace(/[\d.]+\)$/g, opacity + ')');
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
        }
        window.addEventListener('resize', initParticles);
        initParticles();
        animateParticles();
        checkAuth();
    </script>
</body>
