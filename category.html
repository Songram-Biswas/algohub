<!DOCTYPE html>
<html lang="en" class="dark">
<head>

    <title>algoHub | Problems List</title>
    <link rel="icon" type="image/png" href="./favicon.png">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class' }

        <div class="flex items-center gap-4">

                <svg id="theme-toggle-light-icon" class="hidden w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z"></path></svg>
            </button>

            <div class="flex items-center gap-3 pl-4 border-l border-slate-200 dark:border-[#262626]">

            </div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-6 py-10">
        <div class="flex flex-col sm:flex-row sm:items-end justify-between gap-6 mb-8">
            <div>
                <a id="back-link" href="./dashboard" class="text-sm font-medium text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-white transition flex items-center gap-1.5 mb-2 w-max">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
                    Dashboard
                </a>
                <h1 id="category-title" class="text-3xl font-bold tracking-tight text-slate-900 dark:text-white"></h1>
            </div>

            <div class="w-full sm:w-72 relative">
                <div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">

            </div>
        </div>

        <div class="util-panel rounded-xl overflow-hidden" id="problem-container">
            <table class="w-full text-left border-collapse">
                <thead class="bg-slate-50 dark:bg-[#111111] border-b border-slate-200 dark:border-[#262626]">
                    <tr>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider w-16 text-center">Status</th>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider">Problem</th>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider w-32">Difficulty</th>
                        <th class="px-6 py-3 text-xs font-semibold text-slate-500 dark:text-slate-400 uppercase tracking-wider w-32 text-right">Action</th>
                    </tr>
                </thead>
                <tbody id="problem-list" class="divide-y divide-slate-100 dark:divide-[#262626]/60">
                </tbody>
            </table>
        </div>
    </main>

            document.documentElement.classList.remove('dark'); lightIcon.classList.remove('hidden');
        } else {
            document.documentElement.classList.add('dark'); darkIcon.classList.remove('hidden');
        }

        themeToggleBtn.addEventListener('click', function () {
            darkIcon.classList.toggle('hidden'); lightIcon.classList.toggle('hidden');
            if (document.documentElement.classList.contains('dark')) {
                document.documentElement.classList.remove('dark'); localStorage.setItem('color-theme', 'light');
            } else {
                document.documentElement.classList.add('dark'); localStorage.setItem('color-theme', 'dark');

        async function checkAuth() {
            const { data: { session } } = await supabaseClient.auth.getSession();
            if (!session) {
                window.location.href = './';
                return;
            }
            const avatar = document.getElementById('user-avatar');
            if (avatar && session.user.user_metadata.avatar_url) {
                avatar.src = session.user.user_metadata.avatar_url;
            }
            renderCategory();
        }

        function renderCategory() {
            const params = new URLSearchParams(window.location.search);
            const course = params.get('course') || 'blind-75';
            const cat = params.get('type') || 'Array';
            const query = document.getElementById('search-box').value.toLowerCase();

            document.getElementById('back-link').href = `./tracks?course=${course}`;
            document.getElementById('category-title').textContent = `${cat}`;

            const container = document.getElementById('problem-list');
            container.innerHTML = '';

            const solvedArray = JSON.parse(localStorage.getItem('algolab_solved_keys') || '[]');

            PROBLEM_REGISTRY.forEach(prob => {
                if (prob.category === cat) {
                    if (query && !prob.title.toLowerCase().includes(query) && !prob.id.toString().includes(query)) {
                        return;
                    }

                    const isSolved = solvedArray.includes(prob.slug);
                    
                    let targetUrl = `./solution?slug=${prob.slug}`;
                    if (prob.implemented) {
                        targetUrl = `./solutions/${prob.slug}`;
                    }

                    const tr = document.createElement('tr');
                    tr.className = "group hover:bg-slate-50 dark:hover:bg-[#1a1a1a] transition-colors";

                    let diffClass = 'text-emerald-600 bg-emerald-50 dark:text-emerald-400 dark:bg-emerald-500/10';
                    if (prob.difficulty === 'Medium') diffClass = 'text-amber-600 bg-amber-50 dark:text-amber-400 dark:bg-amber-500/10';
                    if (prob.difficulty === 'Hard') diffClass = 'text-red-600 bg-red-50 dark:text-red-400 dark:bg-red-500/10';

                    const statusIcon = isSolved 
                        ? `<svg class="w-5 h-5 text-emerald-500 mx-auto" fill="currentColor" viewBox="0 0 20 20"><path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z" clip-rule="evenodd"></path></svg>`
                        : `<div class="w-4 h-4 rounded-full border-2 border-slate-300 dark:border-[#333333] mx-auto group-hover:border-blue-400 transition-colors"></div>`;

                    tr.innerHTML = `
                        <td class="px-6 py-4 whitespace-nowrap align-middle">
                            ${statusIcon}
                        </td>
                        <td class="px-6 py-4 align-middle">
                            <div class="flex items-center gap-3">
                                <span class="text-sm font-mono text-slate-400 dark:text-slate-500 w-6 text-right">${prob.id}.</span>
                                <a href="${targetUrl}" class="text-base font-semibold text-slate-900 dark:text-white group-hover:text-blue-600 dark:group-hover:text-blue-400 transition-colors">${prob.title}</a>
                            </div>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap align-middle">
                            <span class="text-xs font-bold uppercase tracking-widest px-2.5 py-1 rounded border border-transparent ${diffClass}">${prob.difficulty}</span>
                        </td>
                        <td class="px-6 py-4 whitespace-nowrap text-right align-middle">
                            <a href="${targetUrl}" class="inline-flex items-center justify-center bg-white dark:bg-[#111111] border border-slate-300 dark:border-[#333333] hover:bg-slate-50 dark:hover:bg-[#1a1a1a] text-slate-700 dark:text-slate-300 text-sm font-medium px-4 py-1.5 rounded-md transition-colors shadow-sm">
                                Solve
                            </a>
                        </td>
                    `;
                    container.appendChild(tr);
                }
            });
            
            if(container.innerHTML === '') {
                container.innerHTML = `<tr><td colspan="4" class="px-6 py-8 text-center text-slate-500 dark:text-slate-400 text-sm">No problems found matching your criteria.</td></tr>`;
            }
        }

        document.getElementById('search-box').addEventListener('input', renderCategory);
        document.getElementById('btn-logout').onclick = async () => { await supabaseClient.auth.signOut(); window.location.href = './'; };
        
        checkAuth();
    </script>
</body>
</html>
