    async function checkAuth() {
        const { data: { session } } = await supabaseClient.auth.getSession();
        if (!session) {
            window.location.href = './index.html';
            return;
        }
        renderCategory();
    }

    function renderCategory() {
        const params = new URLSearchParams(window.location.search);
        const course = params.get('course') || 'blind-75';
        const cat = params.get('type') || 'Array';

        document.getElementById('back-link').href = `./tracks.html?course=${course}`;
        document.getElementById('category-title').textContent = `${cat} Problems`;

        const container = document.getElementById('problem-list');
        container.innerHTML = '';

        PROBLEM_REGISTRY.forEach(prob => {
            if (prob.course === course && prob.category === cat) {
                const card = document.createElement('div');
                card.className = "bg-slate-900 border border-slate-800 rounded-xl p-4 flex items-center justify-between";
                
                const btn = prob.implemented 
                    ? `<a href="./solutions/${prob.slug}.html" class="bg-blue-600 hover:bg-blue-500 text-white text-xs font-semibold px-4 py-2 rounded-lg transition">Interactive Solution</a>`
                    : `<button disabled class="bg-slate-800 text-slate-500 text-xs px-4 py-2 rounded-lg cursor-not-allowed">Coming Soon</button>`;

                let diffColor = 'text-emerald-400 bg-emerald-950/40 border-emerald-900';
                if(prob.difficulty === 'Medium') diffColor = 'text-amber-400 bg-amber-950/40 border-amber-900';
                if(prob.difficulty === 'Hard') diffColor = 'text-red-400 bg-red-950/40 border-red-900';

                card.innerHTML = `
                  <div>
                    <span class="text-xs text-slate-500 font-mono">#${prob.id}</span>
                    <h3 class="text-base font-bold text-white">${prob.title}</h3>
                    <span class="text-[10px] px-2 py-0.5 rounded font-bold uppercase tracking-wider border ${diffColor} mt-1 inline-block">${prob.difficulty}</span>
                  </div>
                  ${btn}
                `;
                container.appendChild(card);
            }
        });
    }
